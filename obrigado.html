<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Recebida | NMB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a0a0a;
        }

        .text-neon {
            background: linear-gradient(90deg, #b5179e 0%, #7209b7 50%, #560bad 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen text-center px-4">
    <div class="max-w-2xl">
        <div class="max-w-2xl flex flex-col items-center">
            <div class="mb-8 p-6 bg-white/5 rounded-full">
                <svg class="w-16 h-16 text-[#7209b7]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>

            <h1 class="text-4xl md:text-6xl font-black text-white mb-6">
                Solicitação <span class="text-neon">Enviada!</span>
            </h1>

            <p class="text-gray-400 text-lg md:text-xl mb-10 leading-relaxed">
                Recebemos seus dados. Nossa equipe entrará em contato via WhatsApp em breve para conversarmos sobre seu
                projeto.
            </p>

            <a href="index.html"
                class="inline-block bg-white/10 text-white px-8 py-4 rounded-xl font-bold hover:bg-white/20 transition-all">
                Voltar para o site
            </a>
        </div>
    </div>
</body>

</html>
